<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You 💕</title>
  <style>
    :root {
      --bg-deep: #1a0010;
      --bg-mid: #3b0024;
      --bg-glow: #6b0033;
      --rose-pale: #ffcdd2;
      --rose-soft: #f48fb1;
      --rose-vivid: #e91e63;
      --rose-deep: #880e4f;
      --crimson: #c62828;
      --gold: #ffd700;
      --gold-warm: #ff8f00;
      --gold-pale: #fff8e1;
      --green-dark: #1b5e20;
      --green-light: #388e3c;
      --text-primary: #ff80ab;
      --text-secondary: #fce4ec;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background:
        radial-gradient(ellipse at 30% 20%, rgba(107, 0, 51, 0.9) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 80%, rgba(136, 14, 79, 0.7) 0%, transparent 55%),
        linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-mid) 60%, #2d0018 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .romantic-scene,
    .container {
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 20px;
    }

    .flower-composition {
      position: relative;
      width: min(300px, 90vw);
      height: min(300px, 70vh);
      margin-bottom: min(40px, 5vh);
      filter: drop-shadow(0 10px 30px rgba(233, 30, 99, 0.5));
      will-change: filter;
    }

    .stem,
    .leaf,
    .flower-head,
    .petal,
    .center {
      position: absolute;
      will-change: transform;
    }

    .stem {
      width: 10px;
      height: 0;
      background: linear-gradient(to bottom,
          var(--green-dark),
          var(--green-light));
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      border-radius: 5px;
      animation: growStem 0.5s ease-out forwards;
    }

    .leaf {
      width: min(60px, 16vw);
      height: min(40px, 10vw);
      background: linear-gradient(135deg,
          var(--green-light),
          var(--green-dark));
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      z-index: 2;
      filter: drop-shadow(2px 4px 6px rgba(0, 60, 0, 0.5));
      transform-origin: bottom center;
    }

    .leaf.left {
      top: 60%;
      left: calc(50% - 65px);
      transform: rotate(25deg);
      animation:
        leafEnterLeft 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s backwards,
        leafSwayLeft 6s ease-in-out 1.4s infinite;
    }

    .leaf.right {
      top: 67%;
      left: calc(50% + 0px);
      transform: rotate(-25deg);
      animation:
        leafEnterRight 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s backwards,
        leafSwayRight 6s ease-in-out 1.5s infinite;
    }

    .flower-head {
      width: min(150px, 30vw);
      height: min(150px, 30vw);
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      animation:
        flowerPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s backwards,
        sway 5s ease-in-out 1.3s infinite;
    }

    /* Glowing gold center */
    .center {
      width: min(45px, 11vw);
      height: min(45px, 11vw);
      background: radial-gradient(circle, var(--gold) 25%, var(--gold-warm) 100%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      box-shadow:
        0 0 22px rgba(255, 215, 0, 1),
        0 0 50px rgba(255, 215, 0, 0.6),
        0 0 80px rgba(255, 143, 0, 0.3),
        inset 0 2px 5px rgba(255, 255, 255, 0.4);
      animation: centerPulse 3s ease-in-out infinite;
    }

    /* Deep rose / crimson petals */
    .petal {
      width: min(58px, 11.5vw);
      height: min(88px, 17.5vw);
      background: radial-gradient(ellipse at 50% 20%,
          var(--rose-soft) 0%,
          var(--rose-vivid) 40%,
          var(--rose-deep) 80%,
          var(--crimson) 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow:
        0 0 18px rgba(233, 30, 99, 0.7),
        0 0 35px rgba(233, 30, 99, 0.3);
      z-index: 5;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(-50px);
      opacity: 0;
      animation: petalBloom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Romantic Message */
    .romantic-message {
      position: relative;
      text-align: center;
      margin-top: min(50px, 5vh);
      z-index: 20;
      width: min(800px, 90%);
    }

    .message-main {
      font-size: clamp(2.5rem, 8vw, 5rem);
      margin: 0;
      line-height: 1.2;
      background: linear-gradient(45deg,
          var(--rose-pale),
          var(--text-primary),
          var(--gold-pale),
          var(--text-primary),
          var(--rose-pale));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 300% auto;
      animation: textShine 3s ease-in-out infinite alternate;
      opacity: 1;
      letter-spacing: 2px;
      font-weight: 700;
      will-change: background-position;
      filter: drop-shadow(0 0 15px rgba(233, 30, 99, 0.6));
    }

    .message-sub {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: rgba(252, 228, 236, 0.8);
      margin-top: min(20px, 3vh);
      opacity: 0;
      animation: fadeInUp 1.5s ease-out 1.5s forwards;
      font-weight: 300;
      line-height: 1.6;
      letter-spacing: 0.5px;
      text-shadow: 0 0 20px rgba(233, 30, 99, 0.4);
    }

    /* Particles container */
    .floating-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      contain: strict;
    }

    /* Glowing bokeh */
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatParticle linear infinite;
      will-change: transform, opacity;
      filter: blur(1px);
    }

    /* Floating heart */
    .heart {
      position: absolute;
      width: min(30px, 6vw);
      height: min(30px, 6vw);
      background: linear-gradient(135deg, var(--rose-soft), var(--rose-vivid));
      transform: rotate(45deg);
      animation: floatHeart ease-in-out infinite;
      z-index: 5;
      filter: drop-shadow(0 0 10px rgba(233, 30, 99, 0.8));
      opacity: 0;
      border-radius: 4px;
      will-change: transform, opacity;
    }

    .heart::before,
    .heart::after {
      content: "";
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
      position: absolute;
    }

    .heart::before {
      top: -50%;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: -50%;
    }

    /* Golden sparkle */
    .sparkle {
      position: absolute;
      opacity: 0;
      animation: floatSparkle ease-in-out infinite;
      z-index: 5;
      will-change: transform, opacity;
    }

    .sparkle svg {
      filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.9));
      animation: sparkleSpin linear infinite;
    }

    /* Rose petal falling from top */
    .fall-petal {
      position: absolute;
      top: -20px;
      width: min(18px, 3.5vw);
      height: min(26px, 5vw);
      background: radial-gradient(ellipse at 50% 30%, var(--rose-soft) 0%, var(--rose-vivid) 60%, var(--rose-deep) 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0;
      animation: fallPetal linear infinite;
      filter: drop-shadow(0 0 6px rgba(233, 30, 99, 0.5));
      will-change: transform, opacity;
    }

    /* ─── Keyframes ───────────────────────────────────────────── */

    @keyframes leafSwayLeft {

      0%,
      100% {
        transform: rotate(25deg);
      }

      25% {
        transform: rotate(35deg) scale(1.02);
      }

      50% {
        transform: rotate(25deg);
      }

      75% {
        transform: rotate(30deg) scale(1.01);
      }
    }

    @keyframes leafSwayRight {

      0%,
      100% {
        transform: rotate(-25deg);
      }

      25% {
        transform: rotate(-35deg) scale(1.02);
      }

      50% {
        transform: rotate(-25deg);
      }

      75% {
        transform: rotate(-30deg) scale(1.01);
      }
    }

    @keyframes centerPulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        box-shadow: 0 0 22px rgba(255, 215, 0, 1), 0 0 50px rgba(255, 215, 0, 0.6), 0 0 80px rgba(255, 143, 0, 0.3), inset 0 2px 5px rgba(255, 255, 255, 0.4);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.12);
        box-shadow: 0 0 35px rgba(255, 215, 0, 1), 0 0 70px rgba(255, 215, 0, 0.8), 0 0 110px rgba(255, 143, 0, 0.5), inset 0 2px 5px rgba(255, 255, 255, 0.4);
      }
    }

    @keyframes textShine {
      to {
        background-position: 300% center;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes sway {

      0%,
      100% {
        transform: translateX(-50%) rotate(-5deg);
      }

      50% {
        transform: translateX(-50%) rotate(5deg);
      }
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.5);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
        transform: scale(1);
      }

      90% {
        opacity: 0.7;
      }

      100% {
        transform: translateY(-100vh) rotate(360deg) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes floatHeart {
      0% {
        transform: rotate(45deg) translateY(0) translateX(0) scale(0.75);
        opacity: 0;
      }

      12% {
        opacity: 0.95;
      }

      50% {
        transform: rotate(45deg) translateY(-150px) translateX(25px) scale(1.2);
      }

      85% {
        opacity: 0.8;
      }

      100% {
        transform: rotate(45deg) translateY(-320px) translateX(-20px) scale(0.6);
        opacity: 0;
      }
    }

    @keyframes floatSparkle {
      0% {
        transform: translateY(0) scale(0.6);
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      50% {
        transform: translateY(-130px) scale(1.15);
      }

      85% {
        opacity: 0.8;
      }

      100% {
        transform: translateY(-280px) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes sparkleSpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fallPetal {
      0% {
        transform: translateY(0) rotate(0deg) translateX(0);
        opacity: 0;
      }

      8% {
        opacity: 0.85;
      }

      50% {
        transform: translateY(45vh) rotate(180deg) translateX(40px);
      }

      92% {
        opacity: 0.7;
      }

      100% {
        transform: translateY(110vh) rotate(360deg) translateX(-30px);
        opacity: 0;
      }
    }

    @keyframes growStem {
      0% {
        height: 0;
        opacity: 0;
      }

      100% {
        height: 78%;
        opacity: 1;
      }
    }

    @keyframes leafEnterLeft {
      0% {
        transform: rotate(25deg) scale(0);
        opacity: 0;
      }

      100% {
        transform: rotate(25deg) scale(1);
        opacity: 1;
      }
    }

    @keyframes leafEnterRight {
      0% {
        transform: rotate(-25deg) scale(0);
        opacity: 0;
      }

      100% {
        transform: rotate(-25deg) scale(1);
        opacity: 1;
      }
    }

    @keyframes flowerPop {
      0% {
        transform: translateX(-50%) scale(0) rotate(0deg);
        opacity: 0;
      }

      100% {
        transform: translateX(-50%) scale(1) rotate(-5deg);
        opacity: 1;
      }
    }

    @keyframes petalBloom {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(0) scale(0.1);
      }

      100% {
        opacity: 0.94;
        transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(-50px) scale(1);
      }
    }

    /* ─── UI Chrome ───────────────────────────────────────────── */

    .version-label {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 10px;
      color: rgba(233, 30, 99, 0.15);
      font-family: "Courier New", monospace;
      z-index: 1;
      user-select: none;
      pointer-events: none;
      letter-spacing: 1px;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(233, 30, 99, 0.15);
      border-radius: 50%;
      text-decoration: none;
      color: rgba(233, 30, 99, 0.2);
      backdrop-filter: blur(10px);
      z-index: 100;
      transition: all 0.3s ease;
      box-shadow: none;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(233, 30, 99, 0.55);
      border-color: rgba(233, 30, 99, 0.4);
      transform: scale(1.05);
      box-shadow: 0 2px 12px rgba(233, 30, 99, 0.25);
    }

    .back-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <a href="index.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
  </a>

  <div class="romantic-scene">
    <div class="floating-particles" id="particles"></div>
    <div class="container">
      <div class="flower-composition">
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>
        <div class="flower-head">
          <div class="center"></div>
          <!-- Petals generated by JS -->
        </div>
      </div>
      <div class="romantic-message">
        <h1 class="message-main">you have my heart 💕</h1>
        <p class="message-sub">
          in every heartbeat, in every quiet moment — it's always you 🌹
        </p>
      </div>
    </div>
    <!-- Hearts, sparkles & falling petals generated by JS -->
  </div>

  <div class="version-label">v4</div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      /* ── Glowing rose/crimson bokeh ───────────────────────── */
      function createParticles() {
        const container = document.getElementById("particles");
        const count = Math.min(55, Math.floor(window.innerWidth / 11));
        const fragment = document.createDocumentFragment();
        const colors = [
          "rgba(233,30,99,0.45)",
          "rgba(255,128,171,0.55)",
          "rgba(136,14,79,0.4)",
          "rgba(255,64,129,0.35)",
          "rgba(255,255,255,0.5)",
          "rgba(255,215,0,0.3)",
        ];

        for (let i = 0; i < count; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const size = Math.random() * 10 + 3;
          Object.assign(p.style, {
            width: `${size}px`,
            height: `${size}px`,
            left: `${Math.random() * 100}%`,
            bottom: "-10px",
            background: colors[Math.floor(Math.random() * colors.length)],
            animationDelay: `${Math.random() * 28}s`,
            animationDuration: `${Math.random() * 22 + 14}s`,
          });
          fragment.appendChild(p);
        }
        container.appendChild(fragment);
      }

      /* ── Rose petals (deep crimson, 8 petals) ─────────────── */
      function generatePetals() {
        const flowerHead = document.querySelector(".flower-head");
        const petalCount = 8;
        const angleIncrement = 360 / petalCount;

        for (let i = 0; i < petalCount; i++) {
          const petal = document.createElement("div");
          petal.className = "petal";
          petal.style.setProperty("--rotate", `${i * angleIncrement}deg`);
          petal.style.animationDelay = `${0.9 + i * 0.15}s`;
          flowerHead.insertBefore(petal, flowerHead.firstChild);
        }
      }

      /* ── Floating hearts ──────────────────────────────────── */
      function generateHearts() {
        const scene = document.querySelector(".romantic-scene");
        const positions = [
          { top: "7%", left: "7%", delay: "0s", dur: "9s" },
          { top: "20%", left: "88%", delay: "1.7s", dur: "11s" },
          { top: "12%", left: "72%", delay: "0.7s", dur: "8s" },
          { top: "33%", left: "12%", delay: "2.3s", dur: "12s" },
          { top: "4%", left: "50%", delay: "1.2s", dur: "7s" },
          { top: "46%", left: "92%", delay: "3.2s", dur: "10s" },
        ];

        positions.forEach((pos) => {
          const heart = document.createElement("div");
          heart.className = "heart";
          const scale = (Math.random() * 0.6 + 0.7).toFixed(2);
          Object.assign(heart.style, {
            top: pos.top,
            left: pos.left,
            animationDelay: pos.delay,
            animationDuration: pos.dur,
            transform: `rotate(45deg) scale(${scale})`,
          });
          scene.appendChild(heart);
        });
      }

      /* ── Golden sparkles ──────────────────────────────────── */
      function generateSparkles() {
        const scene = document.querySelector(".romantic-scene");
        const sparkleData = [
          { top: "14%", left: "22%", delay: "0.5s", dur: "8s", spinDur: "3s" },
          { top: "28%", left: "80%", delay: "2.1s", dur: "10s", spinDur: "4s" },
          { top: "6%", left: "60%", delay: "1.4s", dur: "7s", spinDur: "2.5s" },
          { top: "50%", left: "4%", delay: "2.9s", dur: "11s", spinDur: "5s" },
          { top: "38%", left: "50%", delay: "0.9s", dur: "9s", spinDur: "3.5s" },
        ];

        sparkleData.forEach((d) => {
          const sp = document.createElement("div");
          sp.className = "sparkle";
          const sSize = Math.round(Math.random() * 10 + 16);
          Object.assign(sp.style, {
            top: d.top,
            left: d.left,
            width: `${sSize}px`,
            height: `${sSize}px`,
            animationDelay: d.delay,
            animationDuration: d.dur,
          });
          sp.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#FFD700" d="M12 2 L13.6 9.4 L21 12 L13.6 14.6 L12 22 L10.4 14.6 L3 12 L10.4 9.4 Z"/>
          </svg>`;
          sp.querySelector("svg").style.animationDuration = d.spinDur;
          scene.appendChild(sp);
        });
      }

      /* ── Falling rose petals from top ─────────────────────── */
      function generateFallingPetals() {
        const scene = document.querySelector(".romantic-scene");
        const count = Math.min(18, Math.floor(window.innerWidth / 40));

        for (let i = 0; i < count; i++) {
          const fp = document.createElement("div");
          fp.className = "fall-petal";
          Object.assign(fp.style, {
            left: `${Math.random() * 100}%`,
            animationDelay: `${Math.random() * 25}s`,
            animationDuration: `${Math.random() * 10 + 12}s`,
            transform: `rotate(${Math.random() * 360}deg)`,
          });
          scene.appendChild(fp);
        }
      }

      /* ── Init ─────────────────────────────────────────────── */
      function initialize() {
        createParticles();
        generatePetals();
        generateHearts();
        generateSparkles();
        generateFallingPetals();
      }

      initialize();
    });
  </script>
</body>

</html>
