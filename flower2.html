<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Friend 🌻</title>
  <style>
    :root {
      --sky-light: #e0f4ff;
      --sky-mid: #b8e6ff;
      --sky-warm: #fff8e1;
      --yellow-light: #fff176;
      --yellow-main: #fdd835;
      --yellow-deep: #f9a825;
      --orange-warm: #ff8f00;
      --brown-center: #5d4037;
      --brown-dark: #3e2723;
      --green-dark: #388e3c;
      --green-light: #66bb6a;
      --text-primary: #f57f17;
      --text-secondary: #6d4c41;
      --star-color: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(160deg,
          var(--sky-light) 0%,
          var(--sky-mid) 40%,
          var(--sky-warm) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .friend-scene,
    .container {
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 20px;
    }

    .flower-composition {
      position: relative;
      width: min(300px, 90vw);
      height: min(300px, 70vh);
      margin-bottom: min(40px, 5vh);
      filter: drop-shadow(0 10px 25px rgba(253, 216, 53, 0.35));
      will-change: filter;
    }

    .stem,
    .leaf,
    .flower-head,
    .petal,
    .center {
      position: absolute;
      will-change: transform;
    }

    .stem {
      width: 10px;
      height: 0;
      background: linear-gradient(to bottom,
          var(--green-dark),
          var(--green-light));
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      border-radius: 5px;
      animation: growStem 0.5s ease-out forwards;
    }

    .leaf {
      width: min(60px, 16vw);
      height: min(40px, 10vw);
      background: linear-gradient(135deg,
          var(--green-light),
          var(--green-dark));
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      z-index: 2;
      filter: drop-shadow(2px 4px 6px rgba(0, 100, 0, 0.35));
      transform-origin: bottom center;
    }

    .leaf.left {
      top: 60%;
      left: calc(50% - 65px);
      transform: rotate(25deg);
      animation:
        leafEnterLeft 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s backwards,
        leafSwayLeft 6s ease-in-out 1.4s infinite;
    }

    .leaf.right {
      top: 67%;
      left: calc(50% + 0px);
      transform: rotate(-25deg);
      animation:
        leafEnterRight 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s backwards,
        leafSwayRight 6s ease-in-out 1.5s infinite;
    }

    .flower-head {
      width: min(150px, 30vw);
      height: min(150px, 30vw);
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      animation:
        flowerPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s backwards,
        sway 5s ease-in-out 1.3s infinite;
    }

    .center {
      width: min(45px, 11vw);
      height: min(45px, 11vw);
      background: radial-gradient(circle,
          var(--brown-center) 30%,
          var(--brown-dark) 100%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      box-shadow:
        0 0 15px rgba(93, 64, 55, 0.6),
        0 0 30px rgba(93, 64, 55, 0.3),
        inset 0 2px 5px rgba(255, 255, 255, 0.15);
      animation: centerPulse 4s ease-in-out infinite;
    }

    .petal {
      width: min(60px, 12vw);
      height: min(90px, 18vw);
      background: radial-gradient(ellipse at 50% 30%,
          var(--yellow-light) 0%,
          var(--yellow-main) 40%,
          var(--yellow-deep) 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 12px rgba(253, 216, 53, 0.55);
      z-index: 5;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(-50px);
      opacity: 0;
      animation: petalBloom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Friendly Message */
    .friend-message {
      position: relative;
      text-align: center;
      margin-top: min(50px, 5vh);
      z-index: 20;
      width: min(800px, 90%);
    }

    .message-main {
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: var(--text-primary);
      margin: 0;
      line-height: 1.2;
      background: linear-gradient(45deg,
          var(--orange-warm),
          var(--yellow-deep),
          var(--yellow-main),
          var(--yellow-deep),
          var(--orange-warm));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 300% auto;
      animation: textShine 3s ease-in-out infinite alternate;
      opacity: 1;
      letter-spacing: 2px;
      font-weight: 700;
      will-change: background-position;
      text-shadow: none;
      filter: drop-shadow(0 2px 8px rgba(255, 143, 0, 0.3));
    }

    .message-sub {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--text-secondary);
      margin-top: min(20px, 3vh);
      opacity: 0;
      animation: fadeInUp 1.5s ease-out forwards;
      animation-delay: 1.5s;
      font-weight: 400;
      line-height: 1.5;
    }

    .floating-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      contain: strict;
    }

    /* Tiny bokeh circles */
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatParticle linear infinite;
      will-change: transform, opacity;
    }

    /* Floating stars */
    .star {
      position: absolute;
      width: min(28px, 5.5vw);
      height: min(28px, 5.5vw);
      opacity: 0;
      animation: floatStar 9s infinite ease-in-out;
      z-index: 5;
      will-change: transform, opacity;
    }

    .star svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.8));
      animation: starSpin 4s linear infinite;
    }

    /* Floating emoji / confetti dots */
    .dot-confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 3px;
      opacity: 0;
      animation: floatConfetti linear infinite;
      will-change: transform, opacity;
    }

    @keyframes leafSwayLeft {

      0%,
      100% {
        transform: rotate(25deg);
      }

      25% {
        transform: rotate(35deg) scale(1.02);
      }

      50% {
        transform: rotate(25deg);
      }

      75% {
        transform: rotate(30deg) scale(1.01);
      }
    }

    @keyframes leafSwayRight {

      0%,
      100% {
        transform: rotate(-25deg);
      }

      25% {
        transform: rotate(-35deg) scale(1.02);
      }

      50% {
        transform: rotate(-25deg);
      }

      75% {
        transform: rotate(-30deg) scale(1.01);
      }
    }

    @keyframes centerPulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.08);
      }
    }

    @keyframes textShine {
      to {
        background-position: 300% center;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatStar {
      0% {
        transform: translateY(0) translateX(0) scale(0.7);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
      }

      50% {
        transform: translateY(-130px) translateX(25px) scale(1.15);
      }

      80% {
        opacity: 0.8;
      }

      100% {
        transform: translateY(-280px) translateX(-15px) scale(0.6);
        opacity: 0;
      }
    }

    @keyframes starSpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes sway {

      0%,
      100% {
        transform: translateX(-50%) rotate(-5deg);
      }

      50% {
        transform: translateX(-50%) rotate(5deg);
      }
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.5);
        opacity: 0;
      }

      10% {
        opacity: 0.85;
        transform: scale(1);
      }

      90% {
        opacity: 0.7;
      }

      100% {
        transform: translateY(-100vh) rotate(360deg) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes floatConfetti {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 0.8;
      }

      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Version Label */
    .version-label {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 10px;
      color: rgba(253, 216, 53, 0.18);
      font-family: "Courier New", monospace;
      z-index: 1;
      user-select: none;
      pointer-events: none;
      letter-spacing: 1px;
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(253, 216, 53, 0.15);
      border-radius: 50%;
      text-decoration: none;
      color: rgba(253, 216, 53, 0.2);
      backdrop-filter: blur(10px);
      z-index: 100;
      transition: all 0.3s ease;
      box-shadow: none;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      color: rgba(253, 216, 53, 0.5);
      border-color: rgba(253, 216, 53, 0.35);
      transform: scale(1.05);
      box-shadow: 0 2px 10px rgba(253, 216, 53, 0.2);
    }

    .back-btn:active {
      transform: scale(0.98);
    }

    /* Entrance Animations */
    @keyframes growStem {
      0% {
        height: 0;
        opacity: 0;
      }

      100% {
        height: 78%;
        opacity: 1;
      }
    }

    @keyframes leafEnterLeft {
      0% {
        transform: rotate(25deg) scale(0);
        opacity: 0;
      }

      100% {
        transform: rotate(25deg) scale(1);
        opacity: 1;
      }
    }

    @keyframes leafEnterRight {
      0% {
        transform: rotate(-25deg) scale(0);
        opacity: 0;
      }

      100% {
        transform: rotate(-25deg) scale(1);
        opacity: 1;
      }
    }

    @keyframes flowerPop {
      0% {
        transform: translateX(-50%) scale(0) rotate(0deg);
        opacity: 0;
      }

      100% {
        transform: translateX(-50%) scale(1) rotate(-5deg);
        opacity: 1;
      }
    }

    @keyframes petalBloom {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(0) scale(0.1);
      }

      100% {
        opacity: 0.95;
        transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(-50px) scale(1);
      }
    }
  </style>
</head>

<body>
  <a href="index.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
  </a>
  <div class="friend-scene">
    <div class="floating-particles" id="particles"></div>
    <div class="container">
      <div class="flower-composition">
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>
        <div class="flower-head">
          <div class="center"></div>
          <!-- Petals will be generated by JS -->
        </div>
      </div>
      <div class="friend-message">
        <h1 class="message-main">hey bestie 🌻</h1>
        <p class="message-sub">
          glad you're here — you make every day brighter ✨
        </p>
      </div>
    </div>
    <!-- Stars will be generated by JS -->
  </div>
  <div class="version-label">v2</div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Bokeh particles — warm pastel circles
      function createParticles() {
        const particlesContainer = document.getElementById("particles");
        const particleCount = Math.min(55, Math.floor(window.innerWidth / 11));
        const fragment = document.createDocumentFragment();
        const colors = [
          "rgba(253,216,53,0.55)",
          "rgba(255,143,0,0.4)",
          "rgba(255,241,118,0.5)",
          "rgba(102,187,106,0.35)",
          "rgba(255,255,255,0.6)",
          "rgba(135,206,250,0.45)",
        ];

        for (let i = 0; i < particleCount; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const size = Math.random() * 10 + 3;
          Object.assign(p.style, {
            width: `${size}px`,
            height: `${size}px`,
            left: `${Math.random() * 100}%`,
            bottom: "-10px",
            background: colors[Math.floor(Math.random() * colors.length)],
            animationDelay: `${Math.random() * 28}s`,
            animationDuration: `${Math.random() * 22 + 14}s`,
            borderRadius: Math.random() > 0.4 ? "50%" : "3px",
          });
          fragment.appendChild(p);
        }
        particlesContainer.appendChild(fragment);
      }

      // Generate sunflower petals
      function generatePetals() {
        const flowerHead = document.querySelector(".flower-head");
        const petalCount = 12;
        const angleIncrement = 360 / petalCount;

        for (let i = 0; i < petalCount; i++) {
          const petal = document.createElement("div");
          petal.className = "petal";
          petal.style.setProperty("--rotate", `${i * angleIncrement}deg`);
          petal.style.animationDelay = `${0.9 + i * 0.1}s`;
          flowerHead.insertBefore(petal, flowerHead.firstChild);
        }
      }

      // Generate floating stars
      function generateStars() {
        const scene = document.querySelector(".friend-scene");
        const positions = [
          { top: "8%", left: "8%", delay: "0s", dur: "8s" },
          { top: "20%", left: "88%", delay: "1.8s", dur: "10s" },
          { top: "12%", left: "72%", delay: "0.6s", dur: "9s" },
          { top: "32%", left: "12%", delay: "2.5s", dur: "11s" },
          { top: "4%", left: "48%", delay: "1.2s", dur: "7s" },
          { top: "45%", left: "92%", delay: "3s", dur: "12s" },
        ];

        positions.forEach((pos) => {
          const starWrap = document.createElement("div");
          starWrap.className = "star";
          Object.assign(starWrap.style, {
            top: pos.top,
            left: pos.left,
            animationDelay: pos.delay,
            animationDuration: pos.dur,
          });

          // Star SVG (5-pointed)
          starWrap.innerHTML = `<svg viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#FFD700" stroke="#FFA000" stroke-width="1.5"
                d="M25.5 2 L31.3 18.3 H49.1 L35.5 28.1 L41.3 44.4 L25.5 34.6 L9.7 44.4 L15.5 28.1 L1.9 18.3 H19.7 Z"/>
            </svg>`;

          // Randomise spin direction per star
          const spinDur = (Math.random() * 5 + 3).toFixed(1);
          starWrap.querySelector("svg").style.animationDuration = `${spinDur}s`;
          if (Math.random() > 0.5) {
            starWrap.querySelector("svg").style.animationDirection = "reverse";
          }

          scene.appendChild(starWrap);
        });
      }

      // Colourful confetti dots
      function generateConfetti() {
        const scene = document.querySelector(".friend-scene");
        const confettiColors = [
          "#fdd835", "#ff8f00", "#66bb6a",
          "#29b6f6", "#ef5350", "#ba68c8",
        ];
        const count = Math.min(30, Math.floor(window.innerWidth / 22));
        const fragment = document.createDocumentFragment();

        for (let i = 0; i < count; i++) {
          const d = document.createElement("div");
          d.className = "dot-confetti";
          const size = Math.random() * 7 + 5;
          Object.assign(d.style, {
            width: `${size}px`,
            height: `${size}px`,
            background: confettiColors[Math.floor(Math.random() * confettiColors.length)],
            left: `${Math.random() * 100}%`,
            bottom: "-15px",
            borderRadius: Math.random() > 0.5 ? "50%" : "2px",
            animationDelay: `${Math.random() * 30}s`,
            animationDuration: `${Math.random() * 20 + 12}s`,
          });
          fragment.appendChild(d);
        }
        scene.appendChild(fragment);
      }

      // Initialize all elements
      function initialize() {
        createParticles();
        generatePetals();
        generateStars();
        generateConfetti();
      }

      initialize();
    });
  </script>
</body>

</html>
