<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forever Friends 🌼</title>
  <style>
    :root {
      --lavender-light: #f3eeff;
      --lavender-mid: #ddd0f7;
      --lavender-deep: #b39ddb;
      --mint-light: #e8fdf4;
      --mint-mid: #c8f1e0;
      --mint-deep: #80cbc4;
      --peach: #ffe0cc;
      --peach-deep: #ffb085;
      --daisy-petal: #fffde7;
      --daisy-white: #ffffff;
      --gold-center: #fdd835;
      --gold-warm: #f9a825;
      --green-dark: #388e3c;
      --green-light: #81c784;
      --text-primary: #7c4dff;
      --text-secondary: #5e35b1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg,
          var(--lavender-light) 0%,
          var(--lavender-mid) 35%,
          var(--mint-light) 65%,
          var(--mint-mid) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .platonic-scene,
    .container {
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 20px;
    }

    .flower-composition {
      position: relative;
      width: min(300px, 90vw);
      height: min(300px, 70vh);
      margin-bottom: min(40px, 5vh);
      filter: drop-shadow(0 10px 28px rgba(179, 157, 219, 0.4));
      will-change: filter;
    }

    .stem,
    .leaf,
    .flower-head,
    .petal,
    .center {
      position: absolute;
      will-change: transform;
    }

    .stem {
      width: 10px;
      height: 0;
      background: linear-gradient(to bottom,
          var(--green-dark),
          var(--green-light));
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      border-radius: 5px;
      animation: growStem 0.5s ease-out forwards;
    }

    .leaf {
      width: min(60px, 16vw);
      height: min(40px, 10vw);
      background: linear-gradient(135deg,
          var(--green-light),
          var(--green-dark));
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      z-index: 2;
      filter: drop-shadow(2px 4px 6px rgba(0, 100, 0, 0.3));
      transform-origin: bottom center;
    }

    .leaf.left {
      top: 60%;
      left: calc(50% - 65px);
      transform: rotate(25deg);
      animation:
        leafEnterLeft 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s backwards,
        leafSwayLeft 6s ease-in-out 1.4s infinite;
    }

    .leaf.right {
      top: 67%;
      left: calc(50% + 0px);
      transform: rotate(-25deg);
      animation:
        leafEnterRight 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s backwards,
        leafSwayRight 6s ease-in-out 1.5s infinite;
    }

    .flower-head {
      width: min(150px, 30vw);
      height: min(150px, 30vw);
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      animation:
        flowerPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s backwards,
        sway 5s ease-in-out 1.3s infinite;
    }

    /* Daisy center — warm gold */
    .center {
      width: min(45px, 11vw);
      height: min(45px, 11vw);
      background: radial-gradient(circle,
          var(--gold-center) 30%,
          var(--gold-warm) 100%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      box-shadow:
        0 0 18px rgba(253, 216, 53, 0.85),
        0 0 35px rgba(253, 216, 53, 0.4),
        inset 0 2px 5px rgba(255, 255, 255, 0.35);
      animation: centerPulse 4s ease-in-out infinite;
    }

    /* Daisy petals — soft white/cream */
    .petal {
      width: min(55px, 11vw);
      height: min(85px, 17vw);
      background: radial-gradient(ellipse at 50% 20%,
          #ffffff 0%,
          var(--daisy-petal) 50%,
          #e8e0f8 100%);
      border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
      box-shadow: 0 0 12px rgba(179, 157, 219, 0.45);
      z-index: 5;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(-50px);
      opacity: 0;
      animation: petalBloom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Platonic Message */
    .platonic-message {
      position: relative;
      text-align: center;
      margin-top: min(50px, 5vh);
      z-index: 20;
      width: min(800px, 90%);
    }

    .message-main {
      font-size: clamp(2.4rem, 7.5vw, 4.8rem);
      margin: 0;
      line-height: 1.2;
      background: linear-gradient(45deg,
          var(--text-secondary),
          var(--lavender-deep),
          var(--mint-deep),
          var(--lavender-deep),
          var(--text-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 300% auto;
      animation: textShine 3.5s ease-in-out infinite alternate;
      opacity: 1;
      letter-spacing: 1.5px;
      font-weight: 700;
      will-change: background-position;
      filter: drop-shadow(0 2px 10px rgba(124, 77, 255, 0.25));
    }

    .message-sub {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--text-secondary);
      margin-top: min(20px, 3vh);
      opacity: 0;
      animation: fadeInUp 1.5s ease-out 1.5s forwards;
      font-weight: 400;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }

    /* Particles container */
    .floating-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      contain: strict;
    }

    /* Soft pastel bokeh */
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatParticle linear infinite;
      will-change: transform, opacity;
    }

    /* Floating butterfly */
    .butterfly {
      position: absolute;
      opacity: 0;
      animation: floatButterfly ease-in-out infinite;
      z-index: 5;
      will-change: transform, opacity;
    }

    .butterfly svg {
      filter: drop-shadow(0 0 6px rgba(179, 157, 219, 0.7));
      animation: flapWings 0.55s ease-in-out infinite alternate;
      transform-origin: center;
    }

    /* Small floating daisy */
    .mini-daisy {
      position: absolute;
      opacity: 0;
      animation: floatDaisy ease-in-out infinite;
      z-index: 5;
      will-change: transform, opacity;
    }

    .mini-daisy svg {
      filter: drop-shadow(0 0 4px rgba(253, 216, 53, 0.6));
      animation: daisySpin 8s linear infinite;
    }

    /* ─── Keyframes ──────────────────────────────────────────── */

    @keyframes leafSwayLeft {

      0%,
      100% {
        transform: rotate(25deg);
      }

      25% {
        transform: rotate(35deg) scale(1.02);
      }

      50% {
        transform: rotate(25deg);
      }

      75% {
        transform: rotate(30deg) scale(1.01);
      }
    }

    @keyframes leafSwayRight {

      0%,
      100% {
        transform: rotate(-25deg);
      }

      25% {
        transform: rotate(-35deg) scale(1.02);
      }

      50% {
        transform: rotate(-25deg);
      }

      75% {
        transform: rotate(-30deg) scale(1.01);
      }
    }

    @keyframes centerPulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    @keyframes textShine {
      to {
        background-position: 300% center;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes sway {

      0%,
      100% {
        transform: translateX(-50%) rotate(-5deg);
      }

      50% {
        transform: translateX(-50%) rotate(5deg);
      }
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.5);
        opacity: 0;
      }

      10% {
        opacity: 0.8;
        transform: scale(1);
      }

      90% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-100vh) rotate(360deg) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes floatButterfly {
      0% {
        transform: translateY(0) translateX(0) scale(0.8);
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      40% {
        transform: translateY(-100px) translateX(30px) scale(1);
      }

      70% {
        transform: translateY(-200px) translateX(-20px) scale(0.9);
      }

      88% {
        opacity: 0.8;
      }

      100% {
        transform: translateY(-320px) translateX(10px) scale(0.6);
        opacity: 0;
      }
    }

    @keyframes flapWings {
      from {
        transform: scaleX(1);
      }

      to {
        transform: scaleX(0.45);
      }
    }

    @keyframes floatDaisy {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.7);
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      50% {
        transform: translateY(-110px) rotate(180deg) scale(1.05);
      }

      85% {
        opacity: 0.8;
      }

      100% {
        transform: translateY(-270px) rotate(360deg) scale(0.6);
        opacity: 0;
      }
    }

    @keyframes daisySpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* ─── Entrance Animations ────────────────────────────────── */

    @keyframes growStem {
      0% {
        height: 0;
        opacity: 0;
      }

      100% {
        height: 78%;
        opacity: 1;
      }
    }

    @keyframes leafEnterLeft {
      0% {
        transform: rotate(25deg) scale(0);
        opacity: 0;
      }

      100% {
        transform: rotate(25deg) scale(1);
        opacity: 1;
      }
    }

    @keyframes leafEnterRight {
      0% {
        transform: rotate(-25deg) scale(0);
        opacity: 0;
      }

      100% {
        transform: rotate(-25deg) scale(1);
        opacity: 1;
      }
    }

    @keyframes flowerPop {
      0% {
        transform: translateX(-50%) scale(0) rotate(0deg);
        opacity: 0;
      }

      100% {
        transform: translateX(-50%) scale(1) rotate(-5deg);
        opacity: 1;
      }
    }

    @keyframes petalBloom {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(0) scale(0.1);
      }

      100% {
        opacity: 0.96;
        transform: translate(-50%, -50%) rotate(var(--rotate)) translateY(-50px) scale(1);
      }
    }

    /* ─── UI Chrome ──────────────────────────────────────────── */

    .version-label {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 10px;
      color: rgba(179, 157, 219, 0.2);
      font-family: "Courier New", monospace;
      z-index: 1;
      user-select: none;
      pointer-events: none;
      letter-spacing: 1px;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(179, 157, 219, 0.2);
      border-radius: 50%;
      text-decoration: none;
      color: rgba(179, 157, 219, 0.25);
      backdrop-filter: blur(10px);
      z-index: 100;
      transition: all 0.3s ease;
      box-shadow: none;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.22);
      color: rgba(124, 77, 255, 0.5);
      border-color: rgba(124, 77, 255, 0.3);
      transform: scale(1.05);
      box-shadow: 0 2px 10px rgba(179, 157, 219, 0.25);
    }

    .back-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <a href="index.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7" />
    </svg>
  </a>

  <div class="platonic-scene">
    <div class="floating-particles" id="particles"></div>
    <div class="container">
      <div class="flower-composition">
        <div class="stem"></div>
        <div class="leaf left"></div>
        <div class="leaf right"></div>
        <div class="flower-head">
          <div class="center"></div>
          <!-- Petals generated by JS -->
        </div>
      </div>
      <div class="platonic-message">
        <h1 class="message-main">you're my person 🌼</h1>
        <p class="message-sub">
          not every bond needs a label — ours just needs to last 🤝
        </p>
      </div>
    </div>
    <!-- Butterflies & daisies generated by JS -->
  </div>

  <div class="version-label">v3</div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      /* ── Soft bokeh particles ─────────────────────────────── */
      function createParticles() {
        const container = document.getElementById("particles");
        const count = Math.min(50, Math.floor(window.innerWidth / 12));
        const fragment = document.createDocumentFragment();
        const colors = [
          "rgba(179,157,219,0.5)",   // lavender
          "rgba(128,203,196,0.45)",  // mint
          "rgba(255,224,204,0.55)",  // peach
          "rgba(255,255,255,0.6)",   // white
          "rgba(253,216,53,0.35)",   // soft gold
          "rgba(200,241,224,0.5)",   // mint light
        ];

        for (let i = 0; i < count; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const size = Math.random() * 10 + 3;
          Object.assign(p.style, {
            width: `${size}px`,
            height: `${size}px`,
            left: `${Math.random() * 100}%`,
            bottom: "-10px",
            background: colors[Math.floor(Math.random() * colors.length)],
            animationDelay: `${Math.random() * 30}s`,
            animationDuration: `${Math.random() * 22 + 16}s`,
          });
          fragment.appendChild(p);
        }
        container.appendChild(fragment);
      }

      /* ── Daisy petals (white/cream, 10 petals) ───────────── */
      function generatePetals() {
        const flowerHead = document.querySelector(".flower-head");
        const petalCount = 10;
        const angleIncrement = 360 / petalCount;

        for (let i = 0; i < petalCount; i++) {
          const petal = document.createElement("div");
          petal.className = "petal";
          petal.style.setProperty("--rotate", `${i * angleIncrement}deg`);
          petal.style.animationDelay = `${0.9 + i * 0.12}s`;
          flowerHead.insertBefore(petal, flowerHead.firstChild);
        }
      }

      /* ── Floating butterflies ─────────────────────────────── */
      function generateButterflies() {
        const scene = document.querySelector(".platonic-scene");

        const configs = [
          { top: "7%", left: "7%", delay: "0s", dur: "9s", color1: "#ce93d8", color2: "#ba68c8" },
          { top: "18%", left: "87%", delay: "2s", dur: "11s", color1: "#80cbc4", color2: "#4db6ac" },
          { top: "10%", left: "70%", delay: "0.8s", dur: "8s", color1: "#ffb085", color2: "#ff8a65" },
          { top: "35%", left: "10%", delay: "2.8s", dur: "12s", color1: "#b39ddb", color2: "#9575cd" },
          { top: "3%", left: "47%", delay: "1.4s", dur: "7s", color1: "#aed581", color2: "#8bc34a" },
          { top: "48%", left: "93%", delay: "3.5s", dur: "10s", color1: "#f48fb1", color2: "#e91e63" },
        ];

        configs.forEach((cfg) => {
          const wrap = document.createElement("div");
          wrap.className = "butterfly";
          const bSize = Math.round(Math.random() * 12 + 22);
          Object.assign(wrap.style, {
            top: cfg.top,
            left: cfg.left,
            width: `${bSize}px`,
            height: `${bSize}px`,
            animationDelay: cfg.delay,
            animationDuration: cfg.dur,
          });

          // Simple butterfly SVG — two wing pairs
          wrap.innerHTML = `
            <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg">
              <!-- Left wings -->
              <ellipse cx="16" cy="14" rx="15" ry="10"
                fill="${cfg.color1}" fill-opacity="0.85"
                transform="rotate(-20,16,14)"/>
              <ellipse cx="14" cy="28" rx="12" ry="8"
                fill="${cfg.color2}" fill-opacity="0.75"
                transform="rotate(15,14,28)"/>
              <!-- Right wings -->
              <ellipse cx="44" cy="14" rx="15" ry="10"
                fill="${cfg.color1}" fill-opacity="0.85"
                transform="rotate(20,44,14)"/>
              <ellipse cx="46" cy="28" rx="12" ry="8"
                fill="${cfg.color2}" fill-opacity="0.75"
                transform="rotate(-15,46,28)"/>
              <!-- Body -->
              <ellipse cx="30" cy="20" rx="2.5" ry="12" fill="#5e35b1" fill-opacity="0.7"/>
              <!-- Antennae -->
              <line x1="30" y1="8" x2="22" y2="0" stroke="#7c4dff" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="30" y1="8" x2="38" y2="0" stroke="#7c4dff" stroke-width="1.2" stroke-linecap="round"/>
              <circle cx="22" cy="0" r="1.8" fill="#ce93d8"/>
              <circle cx="38" cy="0" r="1.8" fill="#ce93d8"/>
            </svg>`;

          // Randomise flap speed
          const flapSpeed = (Math.random() * 0.3 + 0.4).toFixed(2);
          wrap.querySelector("svg").style.animationDuration = `${flapSpeed}s`;

          scene.appendChild(wrap);
        });
      }

      /* ── Floating mini daisies ────────────────────────────── */
      function generateMiniDaisies() {
        const scene = document.querySelector(".platonic-scene");

        const positions = [
          { top: "20%", left: "20%", delay: "1s", dur: "10s" },
          { top: "38%", left: "83%", delay: "2.4s", dur: "12s" },
          { top: "55%", left: "6%", delay: "0.3s", dur: "9s" },
          { top: "60%", left: "60%", delay: "3.2s", dur: "11s" },
        ];

        positions.forEach((pos) => {
          const wrap = document.createElement("div");
          wrap.className = "mini-daisy";
          const dSize = Math.round(Math.random() * 10 + 18);
          Object.assign(wrap.style, {
            top: pos.top,
            left: pos.left,
            width: `${dSize}px`,
            height: `${dSize}px`,
            animationDelay: pos.delay,
            animationDuration: pos.dur,
          });

          wrap.innerHTML = `
            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="20" cy="8"  rx="4" ry="8" fill="white" fill-opacity="0.9"/>
              <ellipse cx="20" cy="32" rx="4" ry="8" fill="white" fill-opacity="0.9"/>
              <ellipse cx="8"  cy="20" rx="8" ry="4" fill="white" fill-opacity="0.9"/>
              <ellipse cx="32" cy="20" rx="8" ry="4" fill="white" fill-opacity="0.9"/>
              <ellipse cx="11" cy="11" rx="4" ry="8" fill="#fffde7" fill-opacity="0.85"
                transform="rotate(-45,11,11)"/>
              <ellipse cx="29" cy="11" rx="4" ry="8" fill="#fffde7" fill-opacity="0.85"
                transform="rotate(45,29,11)"/>
              <ellipse cx="11" cy="29" rx="4" ry="8" fill="#fffde7" fill-opacity="0.85"
                transform="rotate(45,11,29)"/>
              <ellipse cx="29" cy="29" rx="4" ry="8" fill="#fffde7" fill-opacity="0.85"
                transform="rotate(-45,29,29)"/>
              <circle cx="20" cy="20" r="7" fill="#fdd835"/>
              <circle cx="20" cy="20" r="4" fill="#f9a825"/>
            </svg>`;

          scene.appendChild(wrap);
        });
      }

      /* ── Init ─────────────────────────────────────────────── */
      function initialize() {
        createParticles();
        generatePetals();
        generateButterflies();
        generateMiniDaisies();
      }

      initialize();
    });
  </script>
</body>

</html>
